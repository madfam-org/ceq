apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceq-studio
  namespace: ceq
  labels:
    app: ceq-studio
    app.kubernetes.io/name: ceq-studio
    app.kubernetes.io/part-of: ceq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ceq-studio
  template:
    metadata:
      labels:
        app: ceq-studio
        app.kubernetes.io/name: ceq-studio
        app.kubernetes.io/part-of: ceq
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
      - name: ghcr-credentials
      containers:
      - name: ceq-studio
        image: ghcr.io/madfam-org/ceq/studio:latest
        ports:
        - containerPort: 5801
          name: http
        envFrom:
        - secretRef:
            name: ceq-secrets
            optional: true
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          capabilities:
            drop: [ALL]
        startupProbe:
          httpGet:
            path: /
            port: 5801
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /
            port: 5801
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 5801
          periodSeconds: 30
