apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared-ingress
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cloudflare-tunnel
    ports:
    - port: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-data-egress
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Egress]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: data
    ports:
    - port: 5432
    - port: 6432
    - port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Egress]
  egress:
  - ports:
    - port: 443
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: ceq
  policyTypes: [Ingress, Egress]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: ceq
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: ceq
