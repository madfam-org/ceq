# =============================================================================
# CEQ CI/CD Pipeline (GitOps)
# =============================================================================
#
# Builds + pushes images to GHCR, then commits the new manifest-list digest
# to `infrastructure/k8s/kustomization.yaml`. ArgoCD's `ceq-services`
# application reconciles the change within ~3 min — no kubectl apply from
# CI, no kube-apiserver access required.
#
# Why GitOps: ARC runner pods in the `arc-runners` namespace are
# NetworkPolicy-isolated from kube-apiserver (verified 2026-04-28T03:10Z —
# `kubectl exec -n arc-runners <pod> -- curl https://10.43.0.1:443/`
# returns exit 7). Direct `kubectl apply` from inside a runner is
# architecturally broken. Pattern mirrors rondelio's deploy-*.yml,
# dhanam's deploy-prod.yml, and 6 other repos in the ecosystem.
# Closes ceq#16.
#
# Required secrets:
#   - GITHUB_TOKEN: implicit, used for GHCR push
#   - MADFAM_BOT_PAT (optional): bot PAT for the GitOps commit. Falls back
#     to GITHUB_TOKEN, but a dedicated bot identity is preferred so
#     deploy commits show up as `madfam-deploy-bot` in `git log`.
#
# =============================================================================

name: CEQ Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infrastructure/**'
      - '.github/workflows/deploy.yaml'
      - '!infrastructure/k8s/kustomization.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Serialise deploy commits so two concurrent runs can't fight over
# kustomization.yaml. Newer pushes cancel older queued runs.
concurrency:
  group: ceq-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Canonical image namespace. All three services live at
  # ghcr.io/madfam-org/ceq-{api,studio,worker} (dash-form, not slash-form).
  IMAGE_NAMESPACE: ghcr.io/madfam-org

jobs:
  # ===========================================================================
  # Wait for CI on the same commit before building deploy images.
  # ===========================================================================
  verify-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Wait for CEQ CI workflow
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 90;
            const sleepMs = 20000;
            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yaml",
                head_sha: context.sha,
                per_page: 5,
              });
              const runs = data.workflow_runs || [];
              const ciRun = runs.find((run) => run.name === "CEQ CI") || runs[0];
              if (!ciRun) {
                core.info(`CI run not found yet (attempt ${attempt}/${maxAttempts})`);
                await new Promise((resolve) => setTimeout(resolve, sleepMs));
                continue;
              }
              if (ciRun.status !== "completed") {
                core.info(`CI status=${ciRun.status} (attempt ${attempt}/${maxAttempts})`);
                await new Promise((resolve) => setTimeout(resolve, sleepMs));
                continue;
              }
              if (ciRun.conclusion !== "success") {
                core.setFailed(`CEQ CI finished with conclusion=${ciRun.conclusion}`);
                return;
              }
              core.info(`CEQ CI succeeded for ${context.sha}`);
              return;
            }
            core.setFailed("Timed out waiting for CEQ CI to succeed");

  # ===========================================================================
  # Build API Image
  # ===========================================================================
  build-api:
    name: Build API
    needs: [verify-ci]
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      # docker/build-push-action's `outputs.digest` IS the manifest-list
      # digest for multi-arch and the image manifest digest for single-arch
      # — same value cosign signs above. Reusing it avoids the broken
      # imagetools-inspect retry that was failing on every CEQ Deploy run
      # since acecfd5 (75s × 5 retries, then exit 1).
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/ceq-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        id: build
        with:
          context: ./apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.IMAGE_NAMESPACE }}/ceq-api@${{ steps.build.outputs.digest }}

  # ===========================================================================
  # Build Studio Image
  # ===========================================================================
  build-studio:
    name: Build Studio
    needs: [verify-ci]
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/ceq-studio
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Studio image for smoke
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./apps/studio/Dockerfile
          push: false
          load: true
          tags: ceq-studio:deploy-smoke
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.CEQ_PUBLIC_API_URL || 'https://api.ceq.lol' }}
            NEXT_PUBLIC_WS_URL=${{ vars.CEQ_PUBLIC_WS_URL || 'wss://ws.ceq.lol' }}
            NEXT_PUBLIC_JANUA_URL=${{ vars.CEQ_PUBLIC_JANUA_URL || 'https://auth.madfam.io' }}
            NEXT_PUBLIC_JANUA_CLIENT_ID=${{ vars.CEQ_PUBLIC_JANUA_CLIENT_ID || 'jnc_2EJwBz8xGVsGYOO2r3ck5CJH7YrQw4Yk' }}
            NEXT_PUBLIC_DHANAM_BILLING_URL=${{ vars.CEQ_PUBLIC_DHANAM_BILLING_URL || 'https://api.dhan.am' }}
            NEXT_PUBLIC_CEQ_CHECKOUT_ENABLED=${{ vars.CEQ_PUBLIC_CHECKOUT_ENABLED || 'false' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Studio container
        run: bash scripts/studio-docker-smoke.sh ceq-studio:deploy-smoke

      - name: Push Studio image
        uses: docker/build-push-action@v5
        id: push
        with:
          context: .
          file: ./apps/studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.CEQ_PUBLIC_API_URL || 'https://api.ceq.lol' }}
            NEXT_PUBLIC_WS_URL=${{ vars.CEQ_PUBLIC_WS_URL || 'wss://ws.ceq.lol' }}
            NEXT_PUBLIC_JANUA_URL=${{ vars.CEQ_PUBLIC_JANUA_URL || 'https://auth.madfam.io' }}
            NEXT_PUBLIC_JANUA_CLIENT_ID=${{ vars.CEQ_PUBLIC_JANUA_CLIENT_ID || 'jnc_2EJwBz8xGVsGYOO2r3ck5CJH7YrQw4Yk' }}
            NEXT_PUBLIC_DHANAM_BILLING_URL=${{ vars.CEQ_PUBLIC_DHANAM_BILLING_URL || 'https://api.dhan.am' }}
            NEXT_PUBLIC_CEQ_CHECKOUT_ENABLED=${{ vars.CEQ_PUBLIC_CHECKOUT_ENABLED || 'false' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.IMAGE_NAMESPACE }}/ceq-studio@${{ steps.push.outputs.digest }}

  # ===========================================================================
  # Build Worker Image
  # ===========================================================================
  build-worker:
    name: Build Worker
    needs: [verify-ci]
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      # docker/build-push-action's `outputs.digest` IS the manifest-list
      # digest for multi-arch and the image manifest digest for single-arch
      # — same value cosign signs above. Reusing it avoids the broken
      # imagetools-inspect retry that was failing on every CEQ Deploy run
      # since acecfd5 (75s × 5 retries, then exit 1).
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/ceq-worker
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        id: build
        with:
          context: ./apps/workers
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.IMAGE_NAMESPACE }}/ceq-worker@${{ steps.build.outputs.digest }}


  # ===========================================================================
  # GitOps Deploy: commit digests to kustomization.yaml
  # ===========================================================================
  #
  # Replaces the prior `kubectl apply -k` step. ARC runner pods are
  # NetworkPolicy-isolated from kube-apiserver, so direct cluster access
  # from CI is not viable. Instead: pin the image digests in the manifest,
  # commit + push to main, and let ArgoCD reconcile. The ceq-db-migrate
  # Job carries an ArgoCD PreSync hook annotation, so alembic upgrade head
  # runs before the Deployments roll.
  deploy:
    name: Commit deploy digests (GitOps)
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    needs: [build-api, build-studio, build-worker]
    if: |
      always() &&
      needs.build-api.result == 'success' &&
      needs.build-studio.result == 'success' &&
      needs.build-worker.result == 'success'
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # NOTE 2026-05-03: MADFAM_BOT_PAT was expired and the
          # `secrets.MADFAM_BOT_PAT || secrets.GITHUB_TOKEN` fallback
          # silently failed (a non-empty expired string is still truthy
          # so the `||` never reached the fallback). Use GITHUB_TOKEN
          # directly until the bot PAT is rotated. The job's
          # `permissions: contents: write` block grants the token push
          # access; the only cosmetic side-effect is commits show as
          # `github-actions[bot]` instead of `madfam-deploy-bot`.
          # Re-enable bot attribution later by reverting this hunk.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | tar xz
          sudo mv kustomize /usr/local/bin/

      - name: Commit image digests
        run: |
          set -euo pipefail
          API_DIGEST="${{ needs.build-api.outputs.digest }}"
          STUDIO_DIGEST="${{ needs.build-studio.outputs.digest }}"
          WORKER_DIGEST="${{ needs.build-worker.outputs.digest }}"

          if [ -z "$API_DIGEST" ] || [ -z "$STUDIO_DIGEST" ] || [ -z "$WORKER_DIGEST" ]; then
            echo "Missing required digest (api=$API_DIGEST, studio=$STUDIO_DIGEST, worker=$WORKER_DIGEST)" >&2
            exit 1
          fi

          git config user.name "madfam-deploy-bot"
          git config user.email "deploy-bot@madfam.io"

          for ATTEMPT in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            (
              cd infrastructure/k8s
              kustomize edit set image \
                "ghcr.io/madfam-org/ceq-api=ghcr.io/madfam-org/ceq-api@${API_DIGEST}"
              kustomize edit set image \
                "ghcr.io/madfam-org/ceq-studio=ghcr.io/madfam-org/ceq-studio@${STUDIO_DIGEST}"
              kustomize edit set image \
                "ghcr.io/madfam-org/ceq-worker=ghcr.io/madfam-org/ceq-worker@${WORKER_DIGEST}"
            )
            git add infrastructure/k8s/kustomization.yaml
            if git diff --staged --quiet; then
              echo "No changes to commit (digests already pinned)"
              exit 0
            fi
            git commit -m "deploy(ceq): update digests to ${GITHUB_SHA::8}"
            if git push origin HEAD:main; then
              echo "Pushed deploy commit on attempt ${ATTEMPT}"
              exit 0
            fi
            echo "Push rejected (concurrent commit?). Retry ${ATTEMPT}/3 after backoff..."
            sleep $((ATTEMPT * 10))
          done
          echo "Failed to push deploy commit after 3 attempts" >&2
          exit 1

  # ===========================================================================
  # Notify on completion
  # ===========================================================================
  notify:
    name: Notify
    runs-on: ${{ vars.ARC_BOOTSTRAP_COMPLETE == 'true' && 'madfam-runners-blue' || 'ubuntu-latest' }}
    needs: [deploy]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "CEQ deploy commit pushed. ArgoCD reconciles within ~3 min."
            echo ""
            echo "Endpoints:"
            echo "  - https://ceq.lol (Landing + demo)"
            echo "  - https://app.ceq.lol (Studio)"
            echo "  - https://api.ceq.lol (API)"
            echo "  - wss://ws.ceq.lol (WebSocket)"
            echo ""
            echo "Verify rollout:"
            echo "  enclii ops pods diagnose --namespace ceq --workload ceq-api"
          else
            echo "Deploy commit failed. Check logs for details."
          fi
