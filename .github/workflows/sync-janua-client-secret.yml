name: Sync Janua Client Secret

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync CEQ Janua client secret
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.6

      - name: Configure kubeconfig
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${KUBECONFIG_BASE64}"
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBECONFIG_BASE64}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          current_context="$(kubectl config current-context)"
          cluster_name="$(kubectl config view --raw -o jsonpath="{.contexts[?(@.name==\"${current_context}\")].context.cluster}")"
          kubectl config set-cluster "${cluster_name}" --server="https://37.27.235.104:6443"

      - name: Sync Kubernetes secret
        env:
          JANUA_CLIENT_SECRET: ${{ secrets.JANUA_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          test -n "${JANUA_CLIENT_SECRET}"
          if kubectl -n ceq get secret ceq-janua-client-secret >/dev/null 2>&1; then
            encoded="$(printf '%s' "${JANUA_CLIENT_SECRET}" | base64 -w0)"
            kubectl -n ceq patch secret ceq-janua-client-secret \
              --type=merge \
              -p "{\"data\":{\"JANUA_CLIENT_SECRET\":\"${encoded}\"}}"
          else
            kubectl -n ceq create secret generic ceq-janua-client-secret \
              --from-literal=JANUA_CLIENT_SECRET="${JANUA_CLIENT_SECRET}"
          fi
          kubectl -n ceq annotate secret ceq-janua-client-secret \
            kubectl.kubernetes.io/last-applied-configuration- \
            --overwrite || true
          kubectl -n ceq annotate secret ceq-janua-client-secret \
            enclii.dev/managed-by=github-actions \
            enclii.dev/source=ceq-repo-secret \
            --overwrite
          kubectl -n ceq rollout restart deployment/ceq-studio
