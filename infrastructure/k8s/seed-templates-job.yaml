# CEQ Template Seeder (manual one-shot, NOT in kustomize bundle)
#
# Run only when bootstrapping a fresh database:
#   kubectl apply -f infrastructure/k8s/seed-templates-job.yaml
#
# Intentionally excluded from `kustomization.yaml` so it does not run on
# every ArgoCD sync.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceq-seed-templates
  namespace: ceq
  labels:
    app: ceq
    component: seed
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: ceq
        component: seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
      containers:
        - name: seed
          image: ghcr.io/madfam-org/ceq-api:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Seeding CEQ templates..."
              cd /app
              python -m ceq_api.scripts.seed_db
              echo "Seeding complete!"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: redis-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
