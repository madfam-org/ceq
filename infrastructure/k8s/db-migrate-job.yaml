# CEQ Database Migration Job
#
# Managed by kustomize + ArgoCD. Runs as a PreSync hook before each ArgoCD
# sync, so a new image digest committed to kustomization.yaml triggers a
# fresh migration run before the Deployments roll. Hook-delete-policy
# `BeforeHookCreation` makes ArgoCD delete the prior Job before creating
# the next one (Job names are immutable, so this is required for re-runs).
#
# Manual one-shot:
#   kubectl delete job ceq-db-migrate -n ceq --ignore-not-found=true
#   kubectl apply -f db-migrate-job.yaml
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceq-db-migrate
  namespace: ceq
  labels:
    app: ceq
    component: migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
spec:
  ttlSecondsAfterFinished: 300  # Auto-delete after 5 minutes
  # Bound failures caused by missing ExternalSecrets so ArgoCD does not remain
  # in an indefinite "waiting for hook" operation during Vault outages.
  activeDeadlineSeconds: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: ceq
        component: migration
    spec:
      restartPolicy: Never
      # GHCR pull credentials — the ceq-api image at the dash-form
      # registry path is private; without imagePullSecrets the pod
      # gets 401 from ghcr.io/token. studio-deployment.yaml uses the
      # same secret.
      imagePullSecrets:
        - name: ghcr-credentials
      # Pod-level security context matches studio-deployment.yaml so this
      # Job passes the cluster's Kyverno policies. Without it, ArgoCD sync
      # is blocked by `restrict-capabilities` + `block-host-ports`.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/madfam-org/ceq-api:latest
          # Explicit empty ports list — autogen-deny-host-ports rule
          # evaluates a concrete shape; an absent ports field tripped
          # the policy in this cluster's autogen variant.
          ports: []
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              : "${DATABASE_URL:?DATABASE_URL missing from ceq-secrets}"
              : "${REDIS_URL:?REDIS_URL missing from ceq-secrets}"
              : "${R2_ENDPOINT:?R2_ENDPOINT missing from ceq-secrets}"
              : "${R2_ACCESS_KEY:?R2_ACCESS_KEY missing from ceq-secrets}"
              : "${R2_SECRET_KEY:?R2_SECRET_KEY missing from ceq-secrets}"
              : "${JOB_COMPLETION_CALLBACK_TOKEN:?JOB_COMPLETION_CALLBACK_TOKEN missing from ceq-secrets}"
              echo "Running CEQ database migrations..."
              cd /app
              python -m alembic upgrade head
              echo "Migrations complete!"
          env:
            - name: ENVIRONMENT
              value: production
            # Keep this production settings surface aligned with
            # api-deployment.yaml. Alembic imports ceq_api.config, whose
            # production validation runs before migration code executes.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: REDIS_URL
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_ENDPOINT
            - name: R2_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_ACCESS_KEY
            - name: R2_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_SECRET_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_BUCKET_NAME
            - name: JOB_COMPLETION_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: JOB_COMPLETION_CALLBACK_TOKEN
            - name: JOB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: JOB_WEBHOOK_SECRET
            - name: JANUA_API_URL
              value: "http://janua-api.janua.svc.cluster.local:4100"
            - name: FURNACE_API_URL
              value: "http://furnace-gateway.enclii.svc.cluster.local:4210"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
