---
# CEQ Secrets - Production Configuration
#
# IMPORTANT: This is a TEMPLATE file. Replace placeholder values before deployment.
# For production, use sealed-secrets, external-secrets, or Vault for secret management.
#
# Usage:
#   1. Copy this file: cp secrets.yaml secrets.prod.yaml
#   2. Fill in actual values in secrets.prod.yaml
#   3. Apply: kubectl apply -f secrets.prod.yaml
#   4. NEVER commit secrets.prod.yaml to git!
apiVersion: v1
kind: Secret
metadata:
  name: ceq-secrets
  namespace: ceq
  labels:
    app: ceq
type: Opaque
stringData:
  # Database connection (Ubicloud PostgreSQL or Foundry shared DB)
  # Format: postgres://user:password@host:port/database
  DATABASE_URL: "postgres://ceq:REPLACE_ME@postgres.foundry.svc.cluster.local:5432/ceq_production"

  # Redis connection (shared MADFAM Redis, DB 14 for CEQ)
  # Format: redis://:password@host:port/db
  REDIS_URL: "redis://:REPLACE_ME@redis.data.svc.cluster.local:6379/14"
  REDIS_PASSWORD: "REPLACE_ME"

  # Cloudflare R2 Storage (for models, outputs, assets)
  R2_ENDPOINT: "https://ACCOUNT_ID.r2.cloudflarestorage.com"
  R2_ACCESS_KEY: "REPLACE_ME"
  R2_SECRET_KEY: "REPLACE_ME"
  R2_BUCKET_NAME: "ceq-assets"

  # Worker -> API completion callback
  JOB_COMPLETION_CALLBACK_TOKEN: "REPLACE_ME"

  # Janua Authentication
  JANUA_API_URL: "http://janua-api.janua.svc.cluster.local:4100"
  JANUA_ISSUER_URL: "https://auth.madfam.io"
  NODE_ENV: "production"

  # Furnace GPU Scheduler (Enclii)
  FURNACE_API_URL: "http://furnace-gateway.enclii.svc.cluster.local:4210"
  FURNACE_API_KEY: "REPLACE_ME"
---
# R2 Storage ConfigMap (non-sensitive configuration)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceq-r2-config
  namespace: ceq
  labels:
    app: ceq
data:
  # R2 bucket paths
  models-prefix: "models/"
  outputs-prefix: "outputs/"
  cache-prefix: "cache/"

  # Model caching settings
  cache-max-size-gb: "50"
  cache-ttl-hours: "168"  # 7 days
---
# Environment ConfigMap (non-sensitive settings)
apiVersion: v1
kind: ConfigMap
metadata:
  name: ceq-env-config
  namespace: ceq
  labels:
    app: ceq
data:
  # Application settings
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # Public URLs
  PUBLIC_API_URL: "https://api.ceq.lol"
  PUBLIC_WS_URL: "wss://ws.ceq.lol"
  PUBLIC_STUDIO_URL: "https://ceq.lol"

  # Janua public settings
  JANUA_DOMAIN: "auth.madfam.io"
  JANUA_CLIENT_ID: "ceq-studio"

  # Worker settings
  MAX_WORKERS: "5"
  JOB_TIMEOUT_SECONDS: "3600"
  MODEL_PREFETCH_ENABLED: "true"
