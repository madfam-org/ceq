# CEQ Kubernetes Kustomization
#
# Deploy all CEQ resources with:
#   kubectl apply -k infrastructure/k8s/
#
# In production, ArgoCD's `ceq-services` application reconciles this
# kustomization. CI commits image digests below via
# `kustomize edit set image` after each successful build.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ceq

# Common labels applied to all resource metadata — but NOT selectors.
#
# The previous `commonLabels:` form silently propagated into Service
# spec.selector AND Deployment spec.selector.matchLabels, but pods
# inherit their labels from the Deployment template which carries
# different values (`app.kubernetes.io/name=ceq-studio` /
# `part-of=ceq`). Result: Service selector required 4 labels, pods
# only had 3 with conflicting values → endpoints empty → all of
# ceq.lol returned 502 from cloudflared for ~7 hours on 2026-05-04
# until live-patched + this source fix.
#
# `labels:` with `includeSelectors: false` is the kustomize-
# recommended replacement: still tags every resource's metadata.labels
# for grouping in dashboards, but leaves selectors alone so they keep
# matching whatever the Deployment template actually emits.
labels:
- pairs:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: ceq
    app.kubernetes.io/part-of: madfam-platform

# Resources to include
  # PreSync hook job — runs alembic upgrade head before deployments roll.
resources:
- namespace.yaml
- secrets.yaml
- api-deployment.yaml
- studio-deployment.yaml
- worker-deployment.yaml
- db-migrate-job.yaml
- network-policies.yaml
  # cloudflared removed 2026-04-25: ceq-prod tunnel deleted on Cloudflare side
  # 2026-04-09; ceq.lol / api.ceq.lol / ws.ceq.lol DNS now routes through the
  # main enclii-prod tunnel at the platform level. No per-namespace cloudflared
  # needed. Old config + leaked token (R1 audit) removed in this commit.
  # - cloudflared.yaml
  # seed-templates-job.yaml is intentionally excluded — manual one-shot only.

# Image customization. CI's deploy.yaml workflow rewrites these entries
# via `kustomize edit set image <name>=<name>@sha256:...` on every build,
# pinning each Deployment + the migration Job to a content-addressed
# digest. ArgoCD's `ceq-services` application reconciles the change
# within ~3 min.
#
# 2026-05-03 — pinned api + studio per RFC 0017 + the 2026-05-03
# ecosystem-health audit (Kyverno fail-closed mutable-tag policy).
#
# Why `newName` redirects to slash-form: the deploy.yaml workflow as
# refactored at acecfd5 builds + pushes to `ceq-{api,studio,worker}`
# (dash-form), but every CEQ Deploy run since acecfd5 has failed at the
# digest-resolve step — those dash-form images have never been
# successfully pushed to GHCR. Meanwhile, the running pods (per the
# 2026-05-03 audit) pull `ghcr.io/madfam-org/ceq/{api,studio}:latest`
# (slash-form), the legacy image path that was successfully built up
# through 2026-04-28T02:33Z (pre-GitOps-refactor commit c9da2ce, run
# 25030756141). Pinning `name` to dash-form (what the Deployment
# manifests reference) and `newName` to slash-form (what actually
# exists on GHCR) plus the digest redirects to the real, present-on-
# registry image and removes the `:latest` violation in one step.
#
# The CEQ Deploy workflow itself is broken (dash-form push failure)
# and is tracked separately (see ecosystem-health audit § 2 / RFC 0017
# CI burn-down). Once the workflow is fixed and dash-form images
# actually exist, swap `newName` back to `ceq-{api,studio}` (or just
# delete the `newName` line — name and newName matching is the
# kustomize default).
#
# `ceq-worker` remains `:latest` in this source snapshot because the
# f422b54b deploy commit did not produce a worker digest even though worker
# files changed. `.github/workflows/deploy.yaml` now builds/signs worker on
# every deploy and requires WORKER_DIGEST before committing image updates, so
# the next deploy commit must pin worker the same way API and Studio are pinned.
#
# Digest provenance: `pushing manifest for ghcr.io/madfam-org/<img>:latest@sha256:…`
# line in run 25030756141, jobs 73311672398 (api) and 73311672389 (studio),
# 2026-04-28T02:40-46Z, commit c9da2ce.
images:
- digest: sha256:e8ff78211a12f02cd0dddbcf17d2dfe302f79e336e8942f347f485fe55b0d8a2
  name: ghcr.io/madfam-org/ceq-api
  newName: ghcr.io/madfam-org/ceq-api
- digest: sha256:515dc924c21343e1e56291336543bb94e6a9aa7b1e37c2e784753346220081b6
  name: ghcr.io/madfam-org/ceq-studio
  newName: ghcr.io/madfam-org/ceq-studio
- digest: sha256:bd3e375847ab2ea02bae36f88537d9edf9a59b22781c2433eddd80222e3d721f
  name: ghcr.io/madfam-org/ceq-worker
  newName: ghcr.io/madfam-org/ceq-worker

# ConfigMap generator for environment-specific values
configMapGenerator:
- literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=info
  - METRICS_ENABLED=true
  name: ceq-runtime-config
