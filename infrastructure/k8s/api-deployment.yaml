apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceq-api
  namespace: ceq
  labels:
    app: ceq-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ceq-api
  template:
    metadata:
      labels:
        app: ceq-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: ceq-api
          image: ghcr.io/madfam-org/ceq-api:latest
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 5800
              name: http
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: REDIS_URL
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_ENDPOINT
            - name: R2_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_ACCESS_KEY
            - name: R2_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_SECRET_KEY
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: R2_BUCKET_NAME
            - name: JOB_COMPLETION_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: JOB_COMPLETION_CALLBACK_TOKEN
            - name: JOB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ceq-secrets
                  key: JOB_WEBHOOK_SECRET
            - name: JANUA_API_URL
              value: "http://janua-api.janua.svc.cluster.local"
            # In-cluster JWKS: public auth.madfam.io returns 403 from cluster egress;
            # Janua Service is port 80 -> pod 8080 (not 4100).
            - name: JANUA_JWKS_URL
              value: "http://janua-api.janua.svc.cluster.local/.well-known/jwks.json"
            - name: JANUA_ISSUER
              value: "https://auth.madfam.io"
            - name: JANUA_AUDIENCE
              value: "ceq-api"
            - name: FURNACE_API_URL
              value: "http://furnace-gateway.enclii.svc.cluster.local:4210"
          resources:
            # Headroom sized for the render pipeline: 512x768 Pillow renders
            # spike to ~200Mi transient; baseline API stays under 150Mi.
            # Bump limits if concurrency goes beyond 2 workers.
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5800
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 5800
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ceq-api
  namespace: ceq
  labels:
    app: ceq-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "80"
spec:
  selector:
    app: ceq-api
  ports:
    - name: http
      port: 80
      targetPort: 5800
      protocol: TCP
  type: ClusterIP
