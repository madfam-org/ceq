---
# Cloudflare Tunnel (cloudflared) Deployment for CEQ
# Provides secure ingress without exposing public IPs
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
#
# This uses the remotely-managed tunnel approach with a token.
# The tunnel was created via the Cloudflare Zero Trust dashboard.
# Routes are configured in the dashboard, not in this config file.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-token
  namespace: ceq
  labels:
    app: cloudflared
type: Opaque
stringData:
  # Tunnel token from Cloudflare Zero Trust dashboard
  # Tunnel: ceq-prod
  # Tunnel ID: 0de376f0-dd76-40ab-af58-1a5d63eb9b11
  #
  # IMPORTANT: Configure these routes in Cloudflare Zero Trust dashboard:
  #   - ceq.lol -> http://ceq-studio.ceq.svc.cluster.local:5801
  #   - api.ceq.lol -> http://ceq-api.ceq.svc.cluster.local:5800
  #   - ws.ceq.lol -> http://ceq-api.ceq.svc.cluster.local:5800 (WebSocket)
  tunnel-token: "eyJhIjoiMTJmMTM1M2Y3ODE5ODY1YzU2MTYxY2UwMDI5NzY2OGUiLCJ0IjoiMGRlMzc2ZjAtZGQ3Ni00MGFiLWFmNTgtMWE1ZDYzZWI5YjExIiwicyI6Ik5HTTNNR013T0RNdFpEY3dZUzAwWTJZeExXSTJOemd0WVRVeE9EUmhOelUyWVdWaCJ9"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: ceq
  labels:
    app: cloudflared
spec:
  replicas: 2  # HA: run multiple replicas
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2000"
    spec:
      serviceAccountName: cloudflared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: tunnel-token
          ports:
            - containerPort: 2000
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop:
                - ALL
      # Pod anti-affinity to spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cloudflared
                topologyKey: kubernetes.io/hostname
      # Tolerate node issues briefly
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudflared
  namespace: ceq
  labels:
    app: cloudflared
---
# Network policy to restrict cloudflared egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cloudflared-network-policy
  namespace: ceq
spec:
  podSelector:
    matchLabels:
      app: cloudflared
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 2000
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow connection to CEQ API
    - to:
        - podSelector:
            matchLabels:
              app: ceq-api
      ports:
        - protocol: TCP
          port: 5800
    # Allow connection to CEQ Studio
    - to:
        - podSelector:
            matchLabels:
              app: ceq-studio
      ports:
        - protocol: TCP
          port: 5801
    # Allow connection to Cloudflare (required for tunnel)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 7844
---
# PodDisruptionBudget for HA
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloudflared-pdb
  namespace: ceq
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: cloudflared
