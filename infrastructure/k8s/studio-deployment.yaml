apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceq-studio
  namespace: ceq
  labels:
    app: ceq-studio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ceq-studio
  template:
    metadata:
      labels:
        app: ceq-studio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: ceq-studio
          image: ghcr.io/madfam-org/ceq-studio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5801
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.ceq.lol"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://ws.ceq.lol"
            - name: NEXT_PUBLIC_JANUA_URL
              value: "https://auth.madfam.io"
            - name: NEXT_PUBLIC_JANUA_CLIENT_ID
              value: "jnc_2EJwBz8xGVsGYOO2r3ck5CJH7YrQw4Yk"
            - name: NEXT_PUBLIC_DHANAM_BILLING_URL
              value: "https://api.dhan.am"
            - name: NEXT_PUBLIC_CEQ_CHECKOUT_ENABLED
              value: "false"
            - name: JANUA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ceq-janua-client-secret
                  key: JANUA_CLIENT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /
              port: 5801
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 5801
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ceq-studio
  namespace: ceq
spec:
  selector:
    app: ceq-studio
  ports:
    - name: http
      port: 80
      targetPort: 5801
      protocol: TCP
  type: ClusterIP
