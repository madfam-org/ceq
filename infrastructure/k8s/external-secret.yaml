---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ceq-secrets
  namespace: ceq
  labels:
    app: ceq
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: ceq-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/ceq
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: secret/ceq
        property: REDIS_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/ceq
        property: REDIS_PASSWORD
    - secretKey: R2_ENDPOINT
      remoteRef:
        key: secret/ceq
        property: R2_ENDPOINT
    - secretKey: R2_ACCESS_KEY
      remoteRef:
        key: secret/ceq
        property: R2_ACCESS_KEY
    - secretKey: R2_SECRET_KEY
      remoteRef:
        key: secret/ceq
        property: R2_SECRET_KEY
    - secretKey: R2_BUCKET_NAME
      remoteRef:
        key: secret/ceq
        property: R2_BUCKET_NAME
    - secretKey: JOB_COMPLETION_CALLBACK_TOKEN
      remoteRef:
        key: secret/ceq
        property: JOB_COMPLETION_CALLBACK_TOKEN
    - secretKey: JOB_WEBHOOK_SECRET
      remoteRef:
        key: secret/ceq
        property: JOB_WEBHOOK_SECRET
    - secretKey: FURNACE_API_KEY
      remoteRef:
        key: secret/ceq
        property: FURNACE_API_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ceq-orchestrator-secrets
  namespace: ceq
  labels:
    app: ceq-orchestrator
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: ceq-orchestrator-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: VAST_API_KEY
      remoteRef:
        key: secret/ceq
        property: VAST_API_KEY
    - secretKey: FAL_API_KEY
      remoteRef:
        key: secret/ceq
        property: FAL_API_KEY
    - secretKey: CEQ_WORKER_REDIS_URL
      remoteRef:
        key: secret/ceq
        property: CEQ_WORKER_REDIS_URL
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ceq-janua-client-secret
  namespace: ceq
  labels:
    app: ceq
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: ceq-janua-client-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: JANUA_CLIENT_SECRET
      remoteRef:
        key: secret/ceq
        property: JANUA_CLIENT_SECRET
---
